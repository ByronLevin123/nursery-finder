# Render blueprint — NurseryMatch backend (API + background worker).
#
# Scheduling model: a single always-on WORKER process (node-cron, src/worker.js)
# runs every scheduled job and records each run in job_runs (admin Jobs panel).
# This replaced the previous set of per-endpoint Render cron services so jobs no
# longer double-run and the email/engagement jobs (digests, reminders, drip,
# re-engagement, etc.) actually run. The worker requires a paid instance —
# Render does not offer free background workers.
#
# Secrets are shared via an env var group so the API and worker stay in sync;
# set each value once in the Render dashboard (group "nurserymatch-backend").

envVarGroups:
  - name: nurserymatch-backend
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: INGEST_SECRET
        sync: false
      - key: REVIEW_IP_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ALERT_EMAIL
        sync: false
      # Email (Resend)
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_AUDIENCE_ID
        sync: false
      # AI (Anthropic)
      - key: ANTHROPIC_API_KEY
        sync: false
      # Spam protection (Cloudflare Turnstile)
      - key: TURNSTILE_SECRET_KEY
        sync: false
      # Google Places enrichment
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      # PropertyData market stats
      - key: PROPERTYDATA_API_KEY
        sync: false
      # Marketing Hub — Buffer
      - key: BUFFER_API_TOKEN
        sync: false
      - key: BUFFER_ORGANIZATION_ID
        sync: false
      # Marketing Hub — Google Ads
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_CLIENT_ID
        sync: false
      - key: GOOGLE_ADS_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_ADS_CUSTOMER_ID
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false
      # Stripe billing
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PROVIDER_PRO
        sync: false
      - key: STRIPE_PRICE_PROVIDER_PREMIUM
        sync: false
      - key: STRIPE_PRICE_PARENT_PREMIUM
        sync: false

services:
  # ─── API (web) ───────────────────────────────────────────────────────
  - type: web
    name: nursery-finder-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health
    envVars:
      - fromGroup: nurserymatch-backend
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

  # ─── Worker (background jobs / cron) ─────────────────────────────────
  # Runs src/worker.js — geocoding, Ofsted/crime/land-registry/family-scores,
  # aggregate-areas, Google Places, dimension scores, digests, visit reminders,
  # drip queue, saved-search alerts, re-engagement, admin reports snapshot.
  - type: worker
    name: nursery-finder-worker
    runtime: docker
    plan: starter # workers cannot run on the free plan
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: node src/worker.js
    envVars:
      - fromGroup: nurserymatch-backend
      - key: NODE_ENV
        value: production
      # Optional: keep the API warm + let the worker self-report. Set to the
      # API's public /api/v1/health URL, or leave unset to disable.
      - key: SELF_PING_URL
        sync: false
